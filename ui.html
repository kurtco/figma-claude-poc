<style>
  body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
  textarea { width: 100%; height: 80px; margin-bottom: 12px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
  button { width: 100%; padding: 10px; background: #0d99ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button:disabled { background: #a5d8ff; cursor: not-allowed; }
</style>

<h3>Claude UI Builder</h3>
<textarea id="prompt" placeholder="Ej: Crea un rectángulo rojo de 200x50 y un texto..."></textarea>
<button id="generate">Generar en Canvas</button>

<script>
  const ANTHROPIC_API_KEY = 'sk-ant-api03-XXXXXXXXXXXXXXXXXXXXXX';

  document.getElementById('generate').onclick = async () => {
    const userPrompt = document.getElementById('prompt').value;
    const button = document.getElementById('generate');
    button.innerText = 'Generando...';
    button.disabled = true;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ANTHROPIC_API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-3-5-sonnet-20241022',
          max_tokens: 1024,
          system: 'You are an API that controls Figma. You must output ONLY valid JSON without markdown block formatting. The JSON must be an array of objects representing Figma nodes. Available types: RECTANGLE, TEXT. Properties required: type, width, height, x, y. For RECTANGLE include fills (array of objects with type "SOLID" and color {r, g, b} normalized 0-1). For TEXT include characters.',
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      const data = await response.json();
      const jsonString = data.content[0].text;
      
      const cleanJson = jsonString.replace(/```json/g, '').replace(/```/g, '').trim();
      const figmaNodes = JSON.parse(cleanJson);

      parent.postMessage({ pluginMessage: { type: 'draw-nodes', payload: figmaNodes } }, '*');
    } catch (error) {
      console.error('API Error:', error);
      alert('Error en la petición a Claude. Revisa la consola.');
    } finally {
      button.innerText = 'Generar en Canvas';
      button.disabled = false;
    }
  };
</script>
