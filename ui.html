<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --primary: #0d99ff; --bg: #ffffff; }
    body { font-family: 'Inter', sans-serif; padding: 16px; background: var(--bg); color: #333; margin: 0; }
    .container { display: flex; flex-direction: column; gap: 8px; }
    textarea { 
      width: 100%; height: 120px; padding: 12px; border: 1px solid #e6e6e6; 
      border-radius: 8px; font-size: 12px; resize: none; box-sizing: border-box;
      font-family: inherit;
    }
    textarea:focus { border-color: var(--primary); outline: none; }
    .info-bar { font-size: 10px; color: #666; margin-bottom: 4px; }
    button { 
      width: 100%; padding: 12px; background: var(--primary); color: white; 
      border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;
    }
    button:disabled { background: #b2d7ff; cursor: not-allowed; }
    #status { font-size: 11px; color: #666; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="info-bar">
      <span id="selection-status">Selection: 0 objects</span>
    </div>
    <textarea id="prompt" placeholder="e.g., Modify the selected button to be red or generate a profile layout..."></textarea>
    <button id="generate">Execute Design Engine</button>
    <div id="status">Ready to process</div>
  </div>

  <script>
    const ANTHROPIC_API_KEY = 'sk-ant-api03-XXXXXXXXXXXXXXXXXXXXXX'; //
    let selectionContext = [];

    const promptElem = document.getElementById('prompt');
    const btn = document.getElementById('generate');
    const statusElem = document.getElementById('status');

    // Handle selection updates from the main thread
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'selection-updated') {
        selectionContext = msg.selection;
        document.getElementById('selection-status').innerText = `Selection: ${selectionContext.length} objects`;
      }
    };

    btn.onclick = async () => {
      const userPrompt = promptElem.value;
      if(!userPrompt) return;

      btn.disabled = true;
      statusElem.innerText = 'Querying Claude 3.5 Sonnet...';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': ANTHROPIC_API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 2048,
            system: `You are a Senior Figma Architect. 
            CONTEXT: The user has selected these nodes: ${JSON.stringify(selectionContext)}.
            RULES:
            - If modifying an existing node, use its "id" in the JSON output.
            - If creating new nodes, do not include an "id".
            - Use Auto Layout (layoutMode, itemSpacing, padding) for containers.
            - Output ONLY raw JSON.`,
            messages: [{ role: 'user', content: userPrompt }]
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const rawText = data.content[0].text;
        const cleanJson = rawText.replace(/```json|```/g, '').trim();
        const payload = JSON.parse(cleanJson);

        // Send payload to execution engine in code.ts
        parent.postMessage({ pluginMessage: { type: 'execute-design', payload } }, '*');
        statusElem.innerText = 'Canvas updated successfully';
      } catch (e) {
        statusElem.innerText = 'Error: ' + e.message;
        console.error('API Error:', e);
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
